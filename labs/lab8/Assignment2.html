        <span class="to-top-btn">^</span>
        <script>
            $(document).ready(() =>{                //html ready
                $(window).scroll(() =>{             //add scroll event to a browser window 
                    if($(this).scrollTop() > 100) { 
                        $('.to-top-btn').fadeIn();
                    } else {
                        $('.to-top-btn').fadeOut();
                    }
                });
                $('.to-top-btn').on('click',()=>{
                    $('html, body').animate({scrollTop : 0}, 600);
                });
            });
