<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 5 - Form validation</title>
    <style>
        input,
        textarea {
            width: 95%;
        }

        .alert {
            color: rgb(248, 57, 57);
            padding: 0px;
            margin: 0px;
            display: block !important;
        }

        .hide {
            display: none;
        }
    </style>
</head>

<body>
    <form action="" method="post">
        <table border="1" cellspacing="1" cellpadding="5">
            <tr>
                <th>
                    <label for="full-name">Full Name*</label>
                </th>
                <td>
                    <input type="text" name="full-name" id="full-name" required="required">
                    <p class="hide">Please input your name</p>
                </td>
            </tr>
            <tr>
                <th><label for="form-email">Email*</label></th>
                <td>
                    <input type="text" name="email" id="form-email" required="">
                    <p class="hide">Please input your email</p>
                </td>

            </tr>
            <tr>
                <th><label for="form-password">Password*</label></th>
                <td>
                    <input type="password" name="password" id="form-password" required="" placeholder="Enter your password">
                    <p class="hide">Please input your password (min-length = 6)</p>
                </td>

            </tr>
            <tr>
                <th><label for="form-confirm-password">Confirm Password*</label></th>
                <td>
                    <input type="password" name="password" id="form-confirm-password"
                        placeholder="Enter your password again">
                    <p class="hide">It does not match your password</p>
                </td>

            </tr>
            <tr>
                <th><label for="form-phone-num">Phone number*</label></th>
                <td><input type="tel" name="phone-num" id="form-phone-num"></td>
            </tr>
            <tr>
                <th><label for="form-address">Address</label></th>
                <td><textarea name="address" id="form-address"></textarea></td>
            </tr>
            <tr>
                <th><label for="form-city">City</label></th>
                <td>
                    <table>
                        <td><input type="text" name="city" id="form-city" placeholder="Enter your city"></td>
                        <th><label for="form-state">State</label></th>
                        <td><input type="text" name="state" id="form-state" placeholder="Enter your state"></td>
                    </table>
                </td>
            </tr>
            <tr>
                <th><label for="form-zip-postal">Zip/Postal Code</label></th>
                <td><input type="text" name="zip-postal" id="form-zip-postal" placeholder="Enter your Zip/Postal Code">
                </td>
            </tr>
            <tr>
                <th><label for="form-country">Country</label></th>
                <td>
                    <select name="country" id="form-country">
                        <option value="default">[Select your country]</option>
                        <option value="Vietnam">Vietnam</option>
                        <option value="Laos">Laos</option>
                        <option value="Philipines">Philipines</option>
                    </select>
                </td>
            </tr>
            <tr>
                <th><label for="form-birthday">Birthday</label></th>
                <td><input type="text" name="birthday" id="form-birthday" placeholder="mm/dd/yyyy"></td>
            </tr>
            <tr>
                <th><label for="form-gender">Gender</label></th>
                <td>
                    <select name="gender" id="form-gender">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </td>
            </tr>
            <tr>
                <th><label for="form-starting-date">Starting date</label></th>
                <td>
                    <table>
                        <tr>
                            <td>
                                <input type="radio" name="starting-date" id="form-starting-date" value="Spring">
                                <label for="form-starting-date">Spring</label>
                            </td>

                            <td>
                                <input type="radio" name="starting-date" id="form-starting-date-1" value="Summer">
                                <label for="form-starting-date-1">Summer</label>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
            <tr>
                <th><label for="form-comments">Comments</label></th>
                <td><textarea name="comments" id="form-comments"
                        placeholder="Please send us more information"></textarea></td>
            </tr>
            <tr align="center">
                <td colspan="2">
                    <button type="button">Submit</button>
                </td>
            </tr>
        </table>
    </form>
    <script src="https://code.jquery.com/jquery-3.7.1.js"
        integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script>
        $('button').on('click', () => {
            console.log('clicked');
            if ($('#full-name').val().trim() == '')
                $('#full-name').next().attr('class', 'alert');
            else $('#full-name').next().attr('class', 'hide');
            if ($('#form-email').val().trim() == '')
                $('#form-email').next().attr('class', 'alert');
            else $('#form-email').next().attr('class', 'hide');
            if ($('#form-password').val().trim().length < 6)
                $('#form-password').next().attr('class', 'alert');
            else $('#form-password').next().attr('class','hide');
            if ( $('#form-confirm-password').val().trim() !== $('#form-password').val().trim())
                $('#form-confirm-password').next().attr('class', 'alert');
            else $('#form-confirm-password').next().attr('class','hide');
        });
    </script>
</body>

</html>
