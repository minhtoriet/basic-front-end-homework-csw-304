<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width-device-width, initial-scale=1">
        <title>Assignment 3 - Full screen Overlay Navigation</title>
        <link rel="stylesheet" href="Assignment3.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    </head>
    <body>
        <div class="mobile-menu"><span><i class="fa-solid fa-bars"></i></span><span><p>Show more</p></span></div>
        <nav class="navigation">
            <div class="close-btn"><i class="fa-solid fa-xmark"></i></div>
            <div class="container">
                <ul class="menu">
                    <li><a href="" class="current-item">Trang chủ</a></li>
                    <li class="has-child">
                        <a href="">Khoa CNTT</a>
                        <ul class="submenu">
                            <li><a href="">Về chúng tôi</a></li>
                            <li><a href="">Tin tức</a></li>
                            <li><a href="">Sự kiện</a></li>
                        </ul>
                    </li>
                    <li class="has-child">
                        <a href="">Chương trình đào tạo</a>
                        <ul class="submenu">
                            <li><a href="">Ngành Kỹ thuật phần mềm</a></li>
                            <li><a href="">Ngành Mạng máy tính và Truyền thông Dữ liệu</a></li>
                            <li><a href="">Ngành Khoa học máy tính</a></li>
                        </ul>
                    </li>
                    <li><a href="">Tin tức</a></li>
                    <li><a href="">Sự kiện</a></li>
                    <li><a href="">Nghiên cứu khoa học</a></li>
                    <li><a href="">Giáo vụ</a></li>
                    <li><a href="">Liên hệ</a></li>
                </ul>
            </div>
        </nav>
        <style>
            .mobile-menu {
                display: none;
            }
            @media (max-width : 768px){
                nav {
                    display: none;
                }
                .mobile-menu {
                    display: block;
                    width: 100%;
                    color: white;
                    background-color: black;
                    font-weight: bold;
                    cursor: pointer;
                }
            }
        </style>
        <script>
            $(".mobile-menu").click(() =>{
                $('.navigation').show();
            });
            $('.close-btn').click(()=>{
                $('.navigation').hide();
            });
        </script>
    </body>
</html>
