<!DOCTYPE html>
<html>
    <head>
        <title>Assignment 2 - Create a to-do list</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="Assignment2.css">
    </head>
    <body>
        <div class="container">
            <div class="list-input">
                <h2>My To Do List</h2>
                <input type="text" name="title" id="title-input" placeholder="Title">
                <button type="button" id="title-add">Add</button>
            </div>
            <div class="list">
                <ul>
                    <li class="checked">Hit the gym<span>x</span></li>
                    <li>Marry<span>x</span></li>
                    <li>Meet Girl Friend<span>x</span></li>
                    <li>Buy eggs<span>x</span></li>
                    <li>Read a book<span>x</span></li>
                    <li>Organize room<span>x</span></li>
                </ul>
            </div>
        </div>
        <script>
            document.querySelector('#title-add').addEventListener('click',function(){
                let x = document.createElement('li');
                x.innerHTML = document.querySelector('#title-input').value + `<span>x</span>`;
                document.querySelector('.list ul').append(x);   
            },false);
            document.querySelector('ul').addEventListener('click',(e) =>{
                if (e.target.tagName === 'LI'){
                    e.target.classList.toggle('checked');
                } else {
                    e.target.parentNode.remove();
                }
            });
        </script>
    </body>
</html>
