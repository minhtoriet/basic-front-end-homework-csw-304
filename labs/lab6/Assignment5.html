<!DOCTYPE html>
<html>
    <head>
        <title>Assignment 5 - Alert Messages</title>
        <link rel="stylesheet" href="Assignment5.css">
    </head>
    <body>
        <div class="noti" id="danger">
            <p><b>Danger!</b> Indicates a dangerous or potentially negative action.</p><span>x</span>
        </div>
        <div class="noti" id="success">
            <p><b>Success!</b> Indicates a successful or positive action.</p><span>x</span>
        </div>
        <script type="text/javascript">
            let noti = document.querySelectorAll('.noti');
            noti.forEach(element =>{
                element.style.display = 'block';
                element.style.height = '50px';
                element.style.width = '500px';
                element.style.padding = '10px'; 
                element.style.color = 'white';
                setTimeout(() => {
                    element.style.display = 'none';
                }, 5000);
            })
        </script>
    </body>
</html>
