<!DOCTYPE html>
<html>
    <head>
        <title>Assignment 7 - href replacement</title>
    </head>
    <body>
        <a href="google.com">google.com</a>
        <script type="text/javascript">
            let links = document.querySelectorAll('a[href]');
            links.forEach(element =>{
                element.setAttribute('href','https://stackoverflow.com');
            });
        </script>
    </body>
</html>
