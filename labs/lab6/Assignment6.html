        <script type="text/javascript">
            for (let i = 2; i <= 7; i++){
                document.getElementById(`${i}2`).innerText = parseInt(document.getElementById(`${i}1`).innerText);
                document.getElementById(`${i}3`).innerText = parseFloat(document.getElementById(`${i}1`).innerText);
                document.getElementById(`${i}4`).innerText = Number(document.getElementById(`${i}1`).innerText);
                document.getElementById(`${i}5`).innerText = +(document.getElementById(`${i}1`).innerText);
                document.getElementById(`${i}6`).innerText = (document.getElementById(`${i}1`).innerText) | 0;
            }
